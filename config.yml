# config.yml — GQE Quantum Compilation Configuration

target:
  num_qubits: 3
  type: "file" # Load a saved target unitary from disk
  path: "targets/haar_random_q3.npy"

pool:
  rotation_gates: ["rz"] # choose from rz | rx | ry; order is preserved in the pool/Qiskit basis

model:
  size: "small" # tiny | small | medium | large
  max_gates_count: 125 # Sequence length N

training:
  max_epochs: 50
  num_samples: 200 # Circuits generated per epoch (rollout size)
  batch_size: 32 # Gradient-step batch size (drawn from replay buffer)
  lr: 1.0e-4
  grad_norm_clip: 1.0
  seed: 42
  grpo_clip_ratio: 0.2
  early_stop: false # Stop training once fidelity reaches 1.0

temperature:
  scheduler: "fixed" # fixed | linear | cosine
  initial_value: 0.5
  delta: 0.02
  min_value: 0.1
  max_value: 1.5

buffer:
  max_size: 500
  warmup_size: 400 # keep warmup > num_samples so structure refs are not set by one rollout
  steps_per_epoch: 4

logging:
  verbose: true
  wandb: true # Disabled for local single-process runs in this environment

continuous_opt:
  enabled: true
  optimizer: lbfgs # lbfgs | adam
  steps: 200 # lbfgs: max L-BFGS iterations | adam: gradient steps
  lr: 0.1 # lbfgs is ~10x faster than adam for small param counts
  top_k: 0 # optimize all circuits; set to e.g. 20 to only optimize top-20% by discrete fidelity
  num_restarts: 3

pareto_gd:
  enabled: true # Run GD angle optimization on Pareto circuits after training
  steps: 200 # Optimizer iterations per circuit (L-BFGS: 200 is usually enough)
  lr: 0.1 # Learning rate / step size
  optimizer: lbfgs # lbfgs (recommended) | adam
  num_restarts: 3 # Random angle restarts — best result is kept
  fidelity_eps: 1.0e-6 # Circuits with fidelity >= 1-eps are skipped (already perfect)

pareto:
  enabled: true
  fidelity_floor: 0.5 # circuits below this fidelity are not archived
  fidelity_floor_late: 0.9 # floor raised to this after floor_ramp_epoch
  floor_ramp_epoch: 100 # epoch at which the floor is raised
  max_archive_size: 500
  lambda_depth: 0.4 # 3q run: depth still matters, but the larger gap is in CNOT count
  lambda_cnot: 0.6 # push harder on two-qubit gates once fidelity is already strong
  structure_score_offset: 1.0 # additive offset inside phi(F) * (...)
  fidelity_log_eps: 1.0e-8 # epsilon in -log(1 - F + eps)
  fidelity_log_cap: 12.0 # clip cap for the fidelity shaping term
  reference_ema: 0.05 # small positive EMA keeps structure refs adaptive after warmup
  structure_weight_min: 0.05 # nonzero, but low enough that early training stays fidelity-first
  structure_weight_max: 2.0 # once fidelity is high, structure pressure is much stronger
  structure_ramp_start: 0.90 # below this fidelity, keep structure pressure close to its minimum
  structure_ramp_power: 6.0 # ramp structure pressure late and sharply in the near-threshold regime
  fidelity_threshold: 0.99 # full structure pressure + Pareto depth/CNOT selection threshold

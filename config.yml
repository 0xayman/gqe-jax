# config.yml — Hybrid-Action GQE Quantum Compilation
#
# The policy emits both gate tokens and angles per step. Optional per-rollout
# Adam refinement runs on the sampled angles (policy.inner_refine_steps),
# and the Pareto archive is re-optimised post-training (refinement.*).

target:
  num_qubits: 4
  type: "brickwork" # random | random_reachable | haar_random | file
  path: "targets/haar_random_q4.npy"

pool:
  rotation_gates: ["rz", "ry"] # any subset of rz | rx | ry; ordering preserved

model:
  size: "tiny" # tiny | small | medium | large
  # max_gates_count default = 2 * 4^n. Override to force compactness.
  # max_gates_count: 70

training:
  max_epochs: 300
  num_samples: 1024 # circuits sampled per epoch
  batch_size: 256 # gradient-step batch size
  lr: 1.0e-4
  grad_norm_clip: 1.0
  seed: 42
  grpo_clip_ratio: 0.2
  early_stop: false # stop training once fidelity reaches 1.0

policy:
  entropy_disc: 0.005
  entropy_cont: 0.005
  # Per-rollout Adam steps on the sampled angles before scoring (0 = pure RL).
  inner_refine_steps: 8
  inner_refine_lr: 0.1

temperature:
  scheduler: "cosine" # fixed | linear | cosine
  initial_value: 1.2
  delta: 0.02
  min_value: 0.3
  max_value: 1.5

buffer:
  max_size: 2048
  steps_per_epoch: 8

logging:
  verbose: true
  wandb: true

refinement:
  enabled: true
  steps: 200
  lr: 0.1
  # Adam restarts: 1 from the RL angles, the rest from Uniform[-π, π].
  num_restarts: 16
  apply_simplify: true

reward:
  enabled: true
  # QASER:  base = w_d·M_D/(D+1) + w_c·M_C/(C+1) + w_g·M_G/(G+1)
  #         R    = base**F · (1 - log(1 - F + eps)) - 1
  # Leave qaser_init_max_* at 0 to auto-init running maxima from the first rollout.
  qaser_init_max_depth: 0.0
  qaser_init_max_cnot: 0.0
  qaser_init_max_gates: 0.0
  qaser_w_depth: 1.0
  qaser_w_cnot: 2.5
  qaser_w_gates: 1.5
  # eps > 0 enables the log-infidelity multiplier (set 0 for paper-faithful QASER).
  qaser_log_infidelity_eps: 1.0e-4
  # Pareto archive admission gate; must be reachable during training.
  fidelity_floor: 0.5
  max_archive_size: 500
  fidelity_threshold: 0.99

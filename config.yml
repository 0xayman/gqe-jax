# Default single-target GQE experiment configuration.

target:
  num_qubits: 3
  type: "brickwork" # random | random_reachable | haar_random | file
  path: "targets/haar_random_q3.npy"

pool:
  rotation_gates: ["rz", "ry"] # any subset of rz | rx | ry; ordering preserved

model:
  size: "tiny" # tiny | small | medium | large

training:
  max_epochs: 150
  num_samples: 2048 # circuits sampled per epoch
  batch_size: 512 # gradient-step batch size
  lr: 1.0e-4
  grad_norm_clip: 1.0
  seed: 42
  grpo_clip_ratio: 0.2
  early_stop: false # stop training once fidelity reaches 1.0

policy:
  entropy_disc: 0.003 # categorical-entropy regularisation weight
  entropy_cont: 0.003 # Gaussian-entropy regularisation weight
  angle_supervision_weight: 1.0 # regression weight toward refined rotation angles
  # Optional Adam refinement used to score each sampled gate skeleton.
  inner_refine_steps: 16
  inner_refine_lr: 0.08

temperature:
  scheduler: "fixed" # fixed | linear | cosine
  initial_value: 0.9
  delta: 0.02
  min_value: 0.3
  max_value: 1.5

buffer:
  max_size: 4096
  steps_per_epoch: 4

logging:
  verbose: true
  wandb: true

refinement:
  enabled: true
  steps: 700
  lr: 0.08
  use_linear_trace_loss: true
  early_stop_patience: 70
  early_stop_rel_tol: 1.0e-6
  sweep_passes: 2

reward:
  enabled: true
  lex_fidelity_weight: 1.0
  lex_infidelity_eps: 1.0e-8
  lex_cnot_weight: 0.02
  lex_depth_weight: 0.003
  lex_structure_fidelity_threshold: 0.98
  lex_no_stop_penalty: 1.0
  sequence_discount: 0.995
  # Archive admission floor; lower values keep more exploratory circuits.
  fidelity_floor: 0.5
  max_archive_size: 500
  fidelity_threshold: 0.99
  pair_repeat_window: 0
  pair_repeat_max: 1
  # Minimum fidelity for a Pareto circuit to appear in logs, CSV, and plots.
  # Does not affect the search — only post-run reporting.
  pareto_report_fidelity_floor: 0.99

# config.yml — GQE Quantum Compilation Configuration

target:
  num_qubits: 3
  type: "file" # Load a saved target unitary from disk
  path: "targets/haar_random_q3.npy"

pool:
  rotation_gates: ["rz", "ry"] # choose from rz | rx | ry; order is preserved in the pool/Qiskit basis

model:
  size: "small" # tiny | small | medium | large
  # max_gates_count is optional; if omitted it defaults to
  # config.default_max_gates_count(num_qubits) ~ 2 * 4^n (16 for n=1, 32 for n=2,
  # 128 for n=3, 512 for n=4, capped at 1023). Override below if you want a
  # different ceiling; the STOP token lets the transformer end circuits early.
  # max_gates_count: 128

training:
  max_epochs: 200
  num_samples: 200 # Circuits generated per epoch (rollout size)
  batch_size: 32 # Gradient-step batch size (drawn from replay buffer)
  lr: 1.0e-4
  grad_norm_clip: 1.0
  seed: 42
  grpo_clip_ratio: 0.2
  early_stop: false # Stop training once fidelity reaches 1.0

temperature:
  scheduler: "cosine" # fixed | linear | cosine
  initial_value: 1.2
  delta: 0.02
  min_value: 0.3
  max_value: 1.5

buffer:
  max_size: 500
  steps_per_epoch: 4

logging:
  verbose: true
  wandb: true

continuous_opt:
  enabled: true
  optimizer: lbfgs # lbfgs | adam
  steps: 80
  lr: 0.1
  top_k: 0
  num_restarts: 2

reward:
  enabled: true
  # ── Reward: R = F - lambda_structure * (C + gamma_depth * D) / max_gates_count
  # F is process fidelity, C is CNOT count, D is circuit depth.
  # Two hyperparameters: lambda_structure and gamma_depth.
  # Fidelity dominates when far from 1; structure savings matter as F approaches 1.
  lambda_structure: 0.3 # trade-off weight between fidelity and structure
  gamma_depth: 1.0 # depth-vs-CNOT relative weight (CNOT-only at 0)
  # ── Pareto archive (reporting only; does not feed back into reward) ───────
  fidelity_floor: 0.95 # archive only circuits with F >= 0.95
  max_archive_size: 500
  fidelity_threshold: 0.99 # "best by CNOT/depth at F >= threshold" reporting queries

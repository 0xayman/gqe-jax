# config.yml — Hybrid-Action GQE Quantum Compilation
#
# RL-only training: the policy emits both gate tokens AND initial angles each
# step. Fidelity is evaluated directly from sampled angles — no GD inner loop.
# After training, the Pareto archive is refined with a few Adam steps.

target:
  num_qubits: 3
  type: "brickwork" # random | random_reachable | haar_random | file
  path: "targets/haar_random_q3.npy"

pool:
  rotation_gates: ["rz", "ry"] # any subset of rz | rx | ry; ordering preserved

model:
  # Tiny is calibrated for 2-3q (≤ ~150 tokens) — appropriate for n=3 Haar.
  size: "tiny" # tiny | small | medium | large
  # Leave `max_gates_count` unset → falls back to the per-n heuristic in
  # config.default_max_gates_count (1.5× a Qiskit-style 5·CNOT_lb estimate,
  # floored at 32, capped at 1023). Approximate values:
  #   n=2 → 32   n=3 → 105   n=4 → 458
  # Override here only when you need a tighter / looser budget for a
  # specific target.
  # max_gates_count: 105

training:
  max_epochs: 200 # tight budget — 3q converges fast, this is enough for ~F=0.99+
  num_samples: 1024 # circuits sampled per epoch
  batch_size: 256 # gradient-step batch size
  lr: 1.0e-4
  grad_norm_clip: 1.0
  seed: 42
  grpo_clip_ratio: 0.2
  early_stop: false # stop training once fidelity reaches 1.0

policy:
  entropy_disc: 0.005 # categorical-entropy regularisation weight
  entropy_cont: 0.005 # Gaussian-entropy regularisation weight
  # HyRLQAS-style inner refinement: each rollout sample's angles get this many
  # Adam steps initialised at the RL-suggested angles. The reward then
  # reflects the post-refinement fidelity, so the policy learns to suggest
  # *initial* angles that converge fast rather than the optimum directly.
  # Set to 0 for pure RL (no inner loop). With a tiny model 12-16 helps
  # compensate for limited capacity; 5-10 is enough for small/medium models.
  inner_refine_steps: 12
  inner_refine_lr: 0.1

temperature:
  scheduler: "cosine" # fixed | linear | cosine
  initial_value: 1.2
  delta: 0.02
  min_value: 0.3
  max_value: 1.5

buffer:
  max_size: 2048
  steps_per_epoch: 4

logging:
  verbose: true
  wandb: true

refinement:
  enabled: true
  # n=3 Haar reaches cost ≈ 1e-3 around step ~150 and 1e-8 around ~800-1500
  # (smaller system, faster convergence than 4q). With early-stop in place
  # the budget is safe — bad skeletons bail out on the plateau.
  steps: 1000
  lr: 0.1
  # With adaptive_restarts on (paper: good skeletons converge first try),
  # 4 is enough for n=3 — only 3 random restarts fire on rows still below
  # restart_fidelity_threshold after the RL-init run.
  num_restarts: 4
  apply_simplify: true # simplify each archive circuit before re-optim
  # ── Paper-derived knobs (arXiv:2601.03123) ─────────────────────────────
  # Linear-trace loss (1−|Tr|/d) instead of HS infidelity (1−|Tr|²/d²): the
  # quadratic form flattens near the optimum and stalls the last 1e-3→1e-8
  # window; linear keeps gradient magnitude constant.
  use_linear_trace_loss: true
  # Early-stop: bail out of Adam when no relative improvement ≥ rel_tol for
  # `patience` consecutive steps. Critical because underparameterised
  # skeletons plateau forever near 1e-3 and waste the full step budget.
  early_stop_patience: 50
  early_stop_rel_tol: 1.0e-6
  # Skip random restarts on rows already past the threshold.
  adaptive_restarts: true
  restart_fidelity_threshold: 0.999
  # Closed-form per-parameter sweep polish (DMRG-style atan2 update, Sec
  # 3.2.1). Two passes are usually enough to drive the residual infidelity
  # to floating-point floor on adequately parameterised circuits.
  sweep_passes: 2
  # Fixed-point iteration of the structural simplifier — captures cascade
  # merges that a single forward scan misses.
  simplify_max_passes: 3

reward:
  enabled: true
  # QASER reward: base = w_d * M_D/(D+1) + w_c * M_C/(C+1) + w_g * M_G/(G+1)
  #               R    = base ** F - 1
  #               (M_*: running maxima; F as exponent → structure savings count near F=1)
  # Leave the qaser_init_max_* values at 0 to auto-init the running maxima
  # from the first rollout's observed worst case.
  qaser_init_max_depth: 0.0
  qaser_init_max_cnot: 0.0
  qaser_init_max_gates: 0.0
  # Per-axis weights for the tiny model's limited topological capacity.
  # For n=3 the optimal CNOT lower bound is ~14 (Shende-Markov-Bullock) and
  # the agent can search this space well with the tiny model. w_c=2.0
  # encourages compactness without locking onto the first valid layout.
  qaser_w_depth: 1.0
  qaser_w_cnot: 2.0
  qaser_w_gates: 1.5
  # Log-infidelity multiplier: R *= (1 - log(1 - F + eps)).
  # Set 0 for the paper-faithful QASER form. Setting eps > 0 (1e-3 typical)
  # gives an unbounded marginal pull as F → 1, escaping the F ≈ 0.98 plateau
  # observed on harder targets where pure base^F flattens out. Doesn't change
  # behaviour at low/mid F (multiplier ≈ 1 there).
  qaser_log_infidelity_eps: 1.0e-3
  # fidelity_floor must be reachable during training, otherwise the Pareto
  # archive stays empty and the post-training Adam refinement has nothing
  # to polish. Setting it too low (e.g. 0.0) floods the front with trivially
  # short low-fidelity circuits (a depth-1 F=0.08 circuit is "non-dominated
  # on compactness"). 0.5 keeps the Pareto useful while staying reachable.
  fidelity_floor: 0.5
  max_archive_size: 500
  fidelity_threshold: 0.99 # "best by CNOT/depth at F >= threshold" reporting
  # CNOT-pair-repetition admission filter (arXiv:2601.03123 Sec 4.1).
  # K_3 has only 3 distinct edges and no 1-factorisation (odd-vertex
  # complete graph), so the paper's "rapid mixing via 1-factorisation"
  # argument doesn't apply cleanly at n=3 — disabling the filter avoids
  # over-rejecting otherwise-valid layouts. Re-enable for n>=4.
  pair_repeat_window: 0
  pair_repeat_max: 1

# Default single-target GQE experiment configuration.

target:
  num_qubits: 3
  type: "brickwork" # random | random_reachable | haar_random | file
  path: "targets/haar_random_q3.npy"

pool:
  rotation_gates: ["rz", "ry"] # any subset of rz | rx | ry; ordering preserved

model:
  size: "tiny" # tiny | small | medium | large
  # Safety cap only; rollout stops early when all samples emit STOP.
  # max_gates_count: 105

training:
  max_epochs: 200
  num_samples: 1024 # circuits sampled per epoch
  batch_size: 256 # gradient-step batch size
  lr: 1.0e-4
  grad_norm_clip: 1.0
  seed: 42
  grpo_clip_ratio: 0.2
  early_stop: false # stop training once fidelity reaches 1.0

policy:
  entropy_disc: 0.005 # categorical-entropy regularisation weight
  entropy_cont: 0.005 # Gaussian-entropy regularisation weight
  # Optional Adam refinement applied before scoring each rollout sample.
  inner_refine_steps: 12
  inner_refine_lr: 0.1

temperature:
  scheduler: "cosine" # fixed | linear | cosine
  initial_value: 1.2
  delta: 0.02
  min_value: 0.3
  max_value: 1.5

buffer:
  max_size: 2048
  steps_per_epoch: 4

logging:
  verbose: true
  wandb: true

refinement:
  enabled: true
  steps: 1000
  lr: 0.1
  num_restarts: 4
  apply_simplify: true # simplify each archive circuit before re-optim
  use_linear_trace_loss: true
  early_stop_patience: 50
  early_stop_rel_tol: 1.0e-6
  adaptive_restarts: true
  restart_fidelity_threshold: 0.999
  sweep_passes: 2
  simplify_max_passes: 3

reward:
  enabled: true
  # Fidelity-first reward; structure penalties activate above the threshold.
  mode: "lexicographic" # lexicographic | qaser
  lex_fidelity_weight: 1.0
  lex_infidelity_eps: 1.0e-8
  lex_cnot_weight: 0.01
  lex_depth_weight: 0.001
  lex_total_gate_weight: 0.001
  lex_structure_fidelity_threshold: 0.99
  lex_no_stop_penalty: 1.0
  # QASER-mode parameters are ignored unless reward.mode is "qaser".
  qaser_init_max_depth: 0.0
  qaser_init_max_cnot: 0.0
  qaser_init_max_gates: 0.0
  qaser_w_depth: 1.0
  qaser_w_cnot: 2.0
  qaser_w_gates: 1.5
  qaser_log_infidelity_eps: 1.0e-3
  # Archive admission floor; lower values keep more exploratory circuits.
  fidelity_floor: 0.5
  max_archive_size: 500
  fidelity_threshold: 0.99
  pair_repeat_window: 0
  pair_repeat_max: 1
